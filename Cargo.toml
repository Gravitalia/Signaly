[package]
name = "signaly"
version = "0.1.0"
edition = "2021"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true

[dependencies]
tokio = { version = "1.21.2", features = ["full"] }
warp = "0.3.3"
serde = { version = "1.0", features = ["derive"] }

tokio-postgres = "0.7.7"

dotenv = "0.15.0"
tracing = "0.1.37"
tracing-subscriber = "0.3.16"
jsonwebtoken = "8.2.0"